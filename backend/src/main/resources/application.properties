spring.application.name=TrabalhoDenis

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=PostgreSQL

# Faz o Spring criar eou atualizar as tabelas automaticamente ao iniciar
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL gerado no console
spring.jpa.show-sql=true

# Precisa de um jwt config
app.jwt.secret=segredo-super-seguro-123456789101112
app.jwt.expiration=86400000

# configura o rabbitmq
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest