services:

  backend:
    container_name: trabalho-backend
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      # O Spring Boot mapeia automaticamente SPRING_DATASOURCE_URL que vira spring.datasource.url
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: PostgreSQL
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: secret
      APP_JWT_SECRET: segredo-super-seguro-123456789101112
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      - postgres
      - rabbitmq

  frontend:
    container_name: trabalho-frontend
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  dashboard-monitor:
    container_name: trabalho-dashboard
    build:
      context: ./dashboard-monitor
    ports:
      - "3001:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: trabalho-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PostgreSQL
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: trabalho-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secret
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672 (login: admin/secret)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  postgres-data:
  rabbitmq-data: